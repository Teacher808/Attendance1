<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Development links for better error messages, can switch to production for deployment) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel standalone for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Import Map -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'firebase/firestore';

        const { useState, useEffect, useMemo } = React;

        // --- SVG ICONS (Replaces lucide-react for standalone HTML compatibility) ---
        const BookOpen = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const Users = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const UserCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>;
        const BarChart2 = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
        const Check = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const X = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const LogOut = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
        const Download = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const Trash2 = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const Save = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const Plus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const AlertCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const ShieldAlert = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
          apiKey: "AIzaSyCv8RdVpRsoNm8d_z-M2b0nk2v5ztBbZNY",
          authDomain: "attendancetracker-a57eb.firebaseapp.com",
          projectId: "attendancetracker-a57eb",
          storageBucket: "attendancetracker-a57eb.firebasestorage.app",
          messagingSenderId: "844924844501",
          appId: "1:844924844501:web:312ccff84e1d0ed22ea55c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Use environment appId if available on window, otherwise fallback to project id
        const envAppId = (typeof window !== 'undefined' && window.__app_id) ? window.__app_id : 'attendancetracker-a57eb';

        function App() {
          // --- AUTH & DB STATE ---
          const [fbUser, setFbUser] = useState(null);
          const [dbData, setDbData] = useState({
            Users: [],
            Classes: [],
            Learners: [],
            Attendance: []
          });
          
          // --- APP STATE ---
          const [currentUser, setCurrentUser] = useState(null);
          const [view, setView] = useState('login'); // login, dashboard, classes, learners, attendance, reports
          const [authMode, setAuthMode] = useState('login'); // login, register
          const [loading, setLoading] = useState(true);
          const [errorMsg, setErrorMsg] = useState('');
          const [successMsg, setSuccessMsg] = useState('');
          const [permissionError, setPermissionError] = useState(false);

          // --- FIREBASE INITIALIZATION & SYNC ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                const initToken = typeof window !== 'undefined' ? window.__initial_auth_token : null;
                
                if (initToken) {
                  try {
                    await signInWithCustomToken(auth, initToken);
                  } catch (customTokenError) {
                    console.warn("Custom token mismatch, falling back to anonymous sign-in:", customTokenError);
                    await signInAnonymously(auth);
                  }
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) {
                console.error("Auth error:", err);
                setErrorMsg("Failed to connect to authentication service.");
              }
            };
            
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (user) => {
              setFbUser(user);
              if (!user) setLoading(false);
            });
            
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!fbUser) return;

            const collectionsList = ['Users', 'Classes', 'Learners', 'Attendance'];
            const unsubs = [];
            let loadCount = 0;

            collectionsList.forEach(colName => {
              const colPath = collection(db, 'artifacts', envAppId, 'public', 'data', colName);
              
              const unsub = onSnapshot(colPath, (snapshot) => {
                const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                
                setDbData(prev => ({ ...prev, [colName]: items }));
                
                // Auto-seed admin if Users collection is completely empty
                if (colName === 'Users' && items.length === 0) {
                  const defaultAdmin = {
                    id: 'admin123', username: 'admin', password: 'password', name: 'System Admin', role: 'admin', advisoryClassId: ''
                  };
                  writeDoc('Users', defaultAdmin.id, defaultAdmin);
                }
                
                loadCount++;
                if (loadCount >= collectionsList.length) {
                  setLoading(false);
                }
              }, (err) => {
                console.error(`Error fetching ${colName}:`, err);
                if (err.code === 'permission-denied' || err.message.includes('permissions')) {
                  setPermissionError(true);
                } else {
                  setErrorMsg(`Failed to sync ${colName} data.`);
                }
                setLoading(false); // CRITICAL: Stop the loading spinner even if there's an error
              });
              unsubs.push(unsub);
            });

            return () => unsubs.forEach(u => u());
          }, [fbUser]);

          // --- DB HELPERS ---
          const writeDoc = async (collectionName, docId, data) => {
            if (!fbUser) return false;
            try {
              const docRef = doc(db, 'artifacts', envAppId, 'public', 'data', collectionName, docId);
              await setDoc(docRef, data);
              return true;
            } catch (err) {
              console.error("Write error:", err);
              showError(err.code === 'permission-denied' ? "Permission denied. Check Firestore rules." : "Failed to save data.");
              return false;
            }
          };

          const removeDoc = async (collectionName, docId) => {
            if (!fbUser) return false;
            try {
              const docRef = doc(db, 'artifacts', envAppId, 'public', 'data', collectionName, docId);
              await deleteDoc(docRef);
              return true;
            } catch (err) {
              console.error("Delete error:", err);
              showError(err.code === 'permission-denied' ? "Permission denied. Check Firestore rules." : "Failed to delete data.");
              return false;
            }
          };

          const showError = (msg) => {
            setErrorMsg(msg);
            setTimeout(() => setErrorMsg(''), 4000);
          };

          const showSuccess = (msg) => {
            setSuccessMsg(msg);
            setTimeout(() => setSuccessMsg(''), 3000);
          };

          const generateId = () => Math.random().toString(36).substr(2, 9);

          // --- LOGIN LOGIC ---
          const handleLogin = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const u = formData.get('username');
            const p = formData.get('password');
            
            const matchedUser = dbData.Users.find(user => user.username === u && user.password === p);
            if (matchedUser) {
              setCurrentUser(matchedUser);
              setView('dashboard');
            } else {
              showError("Invalid username or password");
            }
          };

          const handleRegister = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const name = formData.get('name');
            const username = formData.get('username');
            const password = formData.get('password');
            const role = formData.get('role');
            
            // Check if username already exists
            if (dbData.Users.some(u => u.username === username)) {
              showError("Username already exists. Please choose another.");
              return;
            }

            const id = generateId();
            const newUser = { id, name, username, password, role, advisoryClassId: '' };
            
            const success = await writeDoc('Users', id, newUser);
            if (success) {
              showSuccess("Account created successfully!");
              setCurrentUser(newUser); // Auto-login after registration
              setView('dashboard');
            }
          };

          // --- RENDER VIEWS ---
          if (loading) {
            return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>;
          }

          // Handle Firebase Permission Errors Gracefully
          if (permissionError) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-50 px-4 text-center">
                <div className="max-w-2xl bg-white p-8 rounded-xl shadow-lg border border-red-100">
                  <ShieldAlert className="w-16 h-16 text-red-500 mx-auto mb-4" />
                  <h2 className="text-2xl font-bold text-gray-900 mb-2">Firestore Permission Denied</h2>
                  <p className="text-gray-600 mb-6">
                    The app successfully connected to your custom Firebase project, but your Firestore Database is blocking read/write requests.
                  </p>
                  <div className="bg-red-50 border border-red-200 p-6 rounded-lg text-left mb-6">
                    <h3 className="font-semibold text-red-800 mb-2">How to fix this:</h3>
                    <ol className="list-decimal list-inside text-red-700 space-y-2 text-sm">
                      <li>Go to the <strong>Firebase Console</strong> for <code className="bg-red-100 px-1 rounded">attendancetracker-a57eb</code></li>
                      <li>Navigate to <strong>Firestore Database</strong> &gt; <strong>Rules</strong></li>
                      <li>Update your rules to allow access (Test Mode) using the code below:</li>
                    </ol>
                    <div className="bg-slate-900 text-green-400 p-4 rounded-lg mt-4 font-mono text-sm overflow-x-auto">
                      rules_version = '2';<br/>
                      service cloud.firestore {"{"}<br/>
                      &nbsp;&nbsp;match /databases/{"{database}"}/documents {"{"}<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;match /artifacts/{"{appId}"}/public/data/{"{document=**}"} {"{"}<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow read, write: if true;<br/>
                      &nbsp;&nbsp;&nbsp;&nbsp;{"}"}<br/>
                      &nbsp;&nbsp;{"}"}<br/>
                      {"}"}
                    </div>
                  </div>
                  <button onClick={() => window.location.reload()} className="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors">
                    I've updated the rules, Try Again
                  </button>
                </div>
              </div>
            );
          }

          if (!currentUser) {
            return (
              <div className="min-h-screen flex items-center justify-center bg-gray-100 px-4">
                <div className="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
                  <div className="text-center mb-8">
                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4">
                      <UserCheck size={32} />
                    </div>
                    <h2 className="text-2xl font-bold text-gray-900">Attendance Tracker</h2>
                    <p className="text-gray-500 mt-2">{authMode === 'login' ? 'Sign in to your account' : 'Create a new account'}</p>
                  </div>
                  
                  {errorMsg && (
                    <div className="bg-red-50 text-red-600 p-3 rounded-lg flex items-center mb-6 text-sm">
                      <AlertCircle size={16} className="mr-2 shrink-0" /> {errorMsg}
                    </div>
                  )}

                  {authMode === 'login' ? (
                    <form onSubmit={handleLogin} className="space-y-6">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input name="username" type="text" required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="admin" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input name="password" type="password" required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="••••••••" />
                      </div>
                      <button type="submit" className="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
                        Sign In
                      </button>
                      <p className="text-center text-sm text-gray-600 mt-4">
                        Don't have an account? <button type="button" onClick={() => setAuthMode('register')} className="text-blue-600 font-semibold hover:underline">Sign up</button>
                      </p>
                    </form>
                  ) : (
                    <form onSubmit={handleRegister} className="space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input name="name" type="text" required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="Juan Dela Cruz" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Role</label>
                        <select name="role" required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow bg-white">
                          <option value="">Select Role...</option>
                          <option value="Administrator">Administrator</option>
                          <option value="Subject Teacher">Subject Teacher</option>
                          <option value="Adviser">Adviser</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input name="username" type="text" required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="Choose a username" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input name="password" type="password" required className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow" placeholder="Create a password" />
                      </div>
                      <button type="submit" className="w-full bg-emerald-600 text-white font-semibold py-2.5 rounded-lg hover:bg-emerald-700 transition-colors shadow-sm mt-2">
                        Create Account
                      </button>
                      <p className="text-center text-sm text-gray-600 mt-4">
                        Already have an account? <button type="button" onClick={() => setAuthMode('login')} className="text-blue-600 font-semibold hover:underline">Sign in</button>
                      </p>
                    </form>
                  )}
                </div>
              </div>
            );
          }

          // --- SUB-COMPONENTS FOR VIEWS ---
          
          const DashboardView = () => {
            const today = new Date().toISOString().split('T')[0];
            const todaysAttendance = dbData.Attendance.filter(a => a.date === today);
            const presentCount = todaysAttendance.filter(a => a.status === 'Present').length;
            
            return (
              <div className="space-y-6">
                <h2 className="text-2xl font-bold text-gray-800">Dashboard Overview</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                  <StatCard title="Total Classes" value={dbData.Classes.length} icon={<BookOpen size={24} className="text-indigo-600"/>} bg="bg-indigo-50" />
                  <StatCard title="Total Learners" value={dbData.Learners.length} icon={<Users size={24} className="text-blue-600"/>} bg="bg-blue-50" />
                  <StatCard title="Total Users" value={dbData.Users.length} icon={<UserCheck size={24} className="text-emerald-600"/>} bg="bg-emerald-50" />
                  <StatCard title="Present Today" value={presentCount} subtitle={`${todaysAttendance.length} records today`} icon={<Check size={24} className="text-green-600"/>} bg="bg-green-50" />
                </div>
              </div>
            );
          };

          const ClassesView = () => {
            const [isAdding, setIsAdding] = useState(false);

            const handleAdd = async (e) => {
              e.preventDefault();
              const form = new FormData(e.target);
              const name = form.get('name');
              const teacherId = form.get('teacherId');
              const id = generateId();
              
              const success = await writeDoc('Classes', id, { id, name, teacherId });
              if (success) {
                showSuccess('Class added successfully');
                setIsAdding(false);
              }
            };

            return (
              <div className="space-y-6">
                <div className="flex justify-between items-center">
                  <h2 className="text-2xl font-bold text-gray-800">Manage Classes</h2>
                  <button onClick={() => setIsAdding(!isAdding)} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center shadow-sm hover:bg-blue-700">
                    {isAdding ? <X size={18} className="mr-2"/> : <Plus size={18} className="mr-2"/>}
                    {isAdding ? 'Cancel' : 'Add Class'}
                  </button>
                </div>

                {isAdding && (
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <form onSubmit={handleAdd} className="flex flex-col md:flex-row gap-4 items-end">
                      <div className="flex-1 w-full">
                        <label className="block text-sm text-gray-600 mb-1">Class Name</label>
                        <input name="name" required className="w-full px-4 py-2 border rounded-lg" placeholder="e.g. Grade 10 - Rizal" />
                      </div>
                      <div className="flex-1 w-full">
                        <label className="block text-sm text-gray-600 mb-1">Teacher / Adviser</label>
                        <select name="teacherId" className="w-full px-4 py-2 border rounded-lg bg-white">
                          <option value="">Select Teacher...</option>
                          {dbData.Users.filter(u => u.role !== 'student').map(u => (
                            <option key={u.id} value={u.id}>{u.name}</option>
                          ))}
                        </select>
                      </div>
                      <button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-emerald-700 h-10 w-full md:w-auto">
                        Save Class
                      </button>
                    </form>
                  </div>
                )}

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-gray-50 border-b border-gray-100 text-gray-600">
                      <tr>
                        <th className="p-4 font-medium">Class Name</th>
                        <th className="p-4 font-medium">Adviser</th>
                        <th className="p-4 font-medium">Learners</th>
                        <th className="p-4 font-medium text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-50">
                      {dbData.Classes.length === 0 && (
                        <tr><td colSpan="4" className="p-8 text-center text-gray-500">No classes found.</td></tr>
                      )}
                      {dbData.Classes.map(cls => (
                        <tr key={cls.id} className="hover:bg-gray-50">
                          <td className="p-4 font-medium text-gray-800">{cls.name}</td>
                          <td className="p-4 text-gray-600">
                            {dbData.Users.find(u => u.id === cls.teacherId)?.name || 'Unassigned'}
                          </td>
                          <td className="p-4 text-gray-600">
                            {dbData.Learners.filter(l => l.classId === cls.id).length}
                          </td>
                          <td className="p-4 text-right">
                            <button onClick={() => removeDoc('Classes', cls.id)} className="text-red-500 hover:text-red-700 p-2 rounded-md hover:bg-red-50 transition-colors">
                              <Trash2 size={18} />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          const LearnersView = () => {
            const [selectedClass, setSelectedClass] = useState('');
            const [isAdding, setIsAdding] = useState(false);

            const filteredLearners = selectedClass 
              ? dbData.Learners.filter(l => l.classId === selectedClass)
              : dbData.Learners;

            const handleAdd = async (e) => {
              e.preventDefault();
              const form = new FormData(e.target);
              const name = form.get('name');
              const classId = form.get('classId');
              const id = generateId();
              
              const success = await writeDoc('Learners', id, { id, name, classId });
              if (success) {
                showSuccess('Learner added successfully');
                e.target.reset();
              }
            };

            return (
              <div className="space-y-6">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                  <h2 className="text-2xl font-bold text-gray-800">Manage Learners</h2>
                  
                  <div className="flex w-full md:w-auto gap-2">
                    <select 
                      value={selectedClass} 
                      onChange={e => setSelectedClass(e.target.value)}
                      className="px-4 py-2 border rounded-lg bg-white shadow-sm outline-none flex-1 md:w-48"
                    >
                      <option value="">All Classes</option>
                      {dbData.Classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                    <button onClick={() => setIsAdding(!isAdding)} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center shadow-sm hover:bg-blue-700 whitespace-nowrap">
                      {isAdding ? <X size={18} className="mr-2"/> : <Plus size={18} className="mr-2"/>}
                      {isAdding ? 'Cancel' : 'Add'}
                    </button>
                  </div>
                </div>

                {isAdding && (
                  <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <form onSubmit={handleAdd} className="flex flex-col md:flex-row gap-4 items-end">
                      <div className="flex-1 w-full">
                        <label className="block text-sm text-gray-600 mb-1">Full Name</label>
                        <input name="name" required className="w-full px-4 py-2 border rounded-lg" placeholder="Lastname, Firstname" />
                      </div>
                      <div className="flex-1 w-full">
                        <label className="block text-sm text-gray-600 mb-1">Class</label>
                        <select name="classId" required className="w-full px-4 py-2 border rounded-lg bg-white">
                          <option value="">Select Class...</option>
                          {dbData.Classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                      </div>
                      <button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-emerald-700 h-10 w-full md:w-auto">
                        Save Learner
                      </button>
                    </form>
                  </div>
                )}

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-gray-50 border-b border-gray-100 text-gray-600">
                      <tr>
                        <th className="p-4 font-medium">Name</th>
                        <th className="p-4 font-medium">Class</th>
                        <th className="p-4 font-medium text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-50">
                      {filteredLearners.length === 0 && (
                        <tr><td colSpan="3" className="p-8 text-center text-gray-500">No learners found.</td></tr>
                      )}
                      {filteredLearners.map(learner => (
                        <tr key={learner.id} className="hover:bg-gray-50">
                          <td className="p-4 font-medium text-gray-800">{learner.name}</td>
                          <td className="p-4 text-gray-600">
                            {dbData.Classes.find(c => c.id === learner.classId)?.name || 'Unknown'}
                          </td>
                          <td className="p-4 text-right">
                            <button onClick={() => removeDoc('Learners', learner.id)} className="text-red-500 hover:text-red-700 p-2 rounded-md hover:bg-red-50 transition-colors">
                              <Trash2 size={18} />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          const AttendanceView = () => {
            const today = new Date().toISOString().split('T')[0];
            const [date, setDate] = useState(today);
            const [selectedClass, setSelectedClass] = useState('');
            const [subject, setSubject] = useState('All');
            
            // Derived state for the grid
            const classLearners = useMemo(() => {
              return dbData.Learners.filter(l => l.classId === selectedClass).sort((a, b) => a.name.localeCompare(b.name));
            }, [selectedClass, dbData.Learners]);

            // Local state for current attendance session editing
            const [attendanceMap, setAttendanceMap] = useState({});

            // Populate local state when date/class changes
            useEffect(() => {
              if (!selectedClass) return;
              
              const newMap = {};
              classLearners.forEach(l => {
                // Find existing record matching learner, date, and subject
                const compositeId = `${l.id}_${date}_${subject.replace(/\s+/g, '')}`;
                const existingRecord = dbData.Attendance.find(a => a.id === compositeId);
                newMap[l.id] = existingRecord ? existingRecord.status : 'Present'; // Default present
              });
              setAttendanceMap(newMap);
            }, [selectedClass, date, subject, classLearners, dbData.Attendance]);

            const handleSave = async () => {
              if (!selectedClass) return;
              
              let promises = classLearners.map(learner => {
                const compositeId = `${learner.id}_${date}_${subject.replace(/\s+/g, '')}`;
                const record = {
                  id: compositeId,
                  learnerId: learner.id,
                  classId: selectedClass,
                  date: date,
                  type: 'Daily',
                  subject: subject,
                  status: attendanceMap[learner.id]
                };
                return writeDoc('Attendance', compositeId, record);
              });

              await Promise.all(promises);
              showSuccess('Attendance saved successfully');
            };

            const toggleStatus = (learnerId) => {
              setAttendanceMap(prev => {
                const current = prev[learnerId];
                const next = current === 'Present' ? 'Absent' : current === 'Absent' ? 'Late' : 'Present';
                return { ...prev, [learnerId]: next };
              });
            };

            const markAll = (status) => {
              const newMap = {};
              classLearners.forEach(l => newMap[l.id] = status);
              setAttendanceMap(newMap);
            };

            return (
              <div className="space-y-6">
                <h2 className="text-2xl font-bold text-gray-800">Record Attendance</h2>
                
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-4 items-end">
                  <div className="flex-1 min-w-[200px]">
                    <label className="block text-sm text-gray-600 mb-1">Date</label>
                    <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full px-4 py-2 border rounded-lg outline-none focus:border-blue-500" />
                  </div>
                  <div className="flex-1 min-w-[200px]">
                    <label className="block text-sm text-gray-600 mb-1">Class</label>
                    <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full px-4 py-2 border rounded-lg bg-white outline-none focus:border-blue-500">
                      <option value="">Select Class...</option>
                      {dbData.Classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                  </div>
                  <div className="flex-1 min-w-[200px]">
                    <label className="block text-sm text-gray-600 mb-1">Subject (Optional)</label>
                    <input type="text" value={subject} onChange={e => setSubject(e.target.value)} placeholder="e.g. Math, All" className="w-full px-4 py-2 border rounded-lg outline-none focus:border-blue-500" />
                  </div>
                </div>

                {selectedClass && classLearners.length > 0 && (
                  <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                      <span className="text-gray-600 font-medium">Learners ({classLearners.length})</span>
                      <div className="flex gap-2 text-sm">
                        <button onClick={() => markAll('Present')} className="px-3 py-1 bg-green-100 text-green-700 rounded-md hover:bg-green-200 font-medium">All Present</button>
                        <button onClick={() => markAll('Absent')} className="px-3 py-1 bg-red-100 text-red-700 rounded-md hover:bg-red-200 font-medium">All Absent</button>
                      </div>
                    </div>
                    
                    <div className="divide-y divide-gray-100">
                      {classLearners.map(learner => {
                        const status = attendanceMap[learner.id] || 'Present';
                        const statusColors = {
                          Present: 'bg-green-100 text-green-800 border-green-200',
                          Absent: 'bg-red-100 text-red-800 border-red-200',
                          Late: 'bg-yellow-100 text-yellow-800 border-yellow-200'
                        };

                        return (
                          <div key={learner.id} className="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                            <div className="font-medium text-gray-800">{learner.name}</div>
                            <button 
                              onClick={() => toggleStatus(learner.id)}
                              className={`px-6 py-2 rounded-full font-bold text-sm border shadow-sm w-28 transition-colors ${statusColors[status]}`}
                            >
                              {status}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                    
                    <div className="p-4 bg-gray-50 border-t border-gray-100 flex justify-end">
                      <button onClick={handleSave} className="bg-blue-600 text-white px-8 py-2.5 rounded-lg font-bold shadow-sm flex items-center hover:bg-blue-700 transition-colors">
                        <Save size={18} className="mr-2" />
                        Save Attendance
                      </button>
                    </div>
                  </div>
                )}
                
                {selectedClass && classLearners.length === 0 && (
                  <div className="p-8 text-center text-gray-500 bg-white rounded-xl border border-gray-100 shadow-sm">
                    No learners found in this class. Please add learners first.
                  </div>
                )}
              </div>
            );
          };

          const ReportsView = () => {
            // Generate the monthly/overall report logic from original app
            const monthlyData = useMemo(() => {
              return dbData.Classes.map(c => {
                const classLearners = dbData.Learners.filter(l => l.classId === c.id);
                const enrolled = classLearners.length;
                const classAtt = dbData.Attendance.filter(a => a.classId === c.id);
                
                const uniqueDates = [...new Set(classAtt.map(a => a.date))];
                const days = uniqueDates.length || 1;
                const presentCount = classAtt.filter(a => a.status === 'Present' || a.status === 'Late').length;
                
                // ADA (Average Daily Attendance)
                const ada = (presentCount / days).toFixed(2);
                // PDA (Percentage of Daily Attendance)
                const pda = enrolled ? Math.round((ada / enrolled) * 100) : 0;
                
                return { className: c.name, enrolled, ada, pda };
              });
            }, [dbData.Classes, dbData.Learners, dbData.Attendance]);

            return (
              <div className="space-y-6">
                <div className="flex justify-between items-center">
                  <h2 className="text-2xl font-bold text-gray-800">Attendance Reports</h2>
                  <button className="text-blue-600 bg-blue-50 px-4 py-2 rounded-lg font-medium flex items-center hover:bg-blue-100">
                    <Download size={18} className="mr-2"/> Export CSV
                  </button>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                  <table className="w-full text-left">
                    <thead className="bg-gray-50 border-b border-gray-100 text-gray-600">
                      <tr>
                        <th className="p-4 font-medium">Class Name</th>
                        <th className="p-4 font-medium text-center">Enrolled</th>
                        <th className="p-4 font-medium text-center">ADA <span className="block text-xs font-normal mt-1">(Average Daily)</span></th>
                        <th className="p-4 font-medium text-center">PDA <span className="block text-xs font-normal mt-1">(Percentage)</span></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {monthlyData.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-gray-500">No report available</td></tr>}
                      {monthlyData.map((stat, idx) => (
                        <tr key={idx} className="hover:bg-gray-50 transition-colors">
                          <td className="p-4 font-bold text-gray-800">{stat.className}</td>
                          <td className="p-4 text-center text-gray-600 font-medium">{stat.enrolled}</td>
                          <td className="p-4 text-center font-bold text-blue-600 text-lg">{stat.ada}</td>
                          <td className="p-4 text-center">
                            <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold shadow-sm ${stat.pda >= 85 ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : stat.pda >= 75 ? 'bg-yellow-100 text-yellow-700 border border-yellow-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>
                              {stat.pda}%
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          // --- MAIN RENDER ---
          return (
            <div className="min-h-screen bg-gray-50 flex flex-col md:flex-row font-sans">
              
              {/* Toast Notifications */}
              <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                {successMsg && (
                  <div className="bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg flex items-center animate-bounce-in font-medium pointer-events-auto">
                    <Check size={18} className="mr-2"/> {successMsg}
                  </div>
                )}
                {errorMsg && (
                  <div className="bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg flex items-center font-medium pointer-events-auto">
                    <AlertCircle size={18} className="mr-2"/> {errorMsg}
                  </div>
                )}
              </div>

              {/* Sidebar */}
              <aside className="w-full md:w-64 bg-slate-900 text-white flex flex-col">
                <div className="p-6 flex items-center gap-3 bg-slate-950 border-b border-slate-800">
                  <BookOpen className="text-blue-400" size={28} />
                  <h1 className="text-xl font-bold tracking-tight">Attendance Tracker</h1>
                </div>
                
                <nav className="flex-1 px-4 py-6 flex flex-col gap-2 overflow-y-auto">
                  <NavItem icon={<BarChart2 size={20} />} label="Dashboard" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                  <NavItem icon={<Check size={20} />} label="Attendance" active={view === 'attendance'} onClick={() => setView('attendance')} />
                  <NavItem icon={<BookOpen size={20} />} label="Classes" active={view === 'classes'} onClick={() => setView('classes')} />
                  <NavItem icon={<Users size={20} />} label="Learners" active={view === 'learners'} onClick={() => setView('learners')} />
                  <NavItem icon={<BarChart2 size={20} />} label="Reports" active={view === 'reports'} onClick={() => setView('reports')} />
                </nav>

                <div className="p-4 border-t border-slate-800 bg-slate-950 flex items-center justify-between">
                  <div className="flex items-center gap-3 overflow-hidden">
                    <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-blue-400 font-bold shrink-0">
                      {currentUser.name.charAt(0)}
                    </div>
                    <div className="truncate">
                      <p className="text-sm font-medium text-white truncate">{currentUser.name}</p>
                      <p className="text-xs text-slate-400 capitalize">{currentUser.role}</p>
                    </div>
                  </div>
                  <button onClick={() => setCurrentUser(null)} className="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                    <LogOut size={18} />
                  </button>
                </div>
              </aside>

              {/* Main Content Area */}
              <main className="flex-1 p-4 md:p-8 overflow-y-auto h-screen relative">
                <div className="max-w-6xl mx-auto pb-20">
                  {view === 'dashboard' && <DashboardView />}
                  {view === 'classes' && <ClassesView />}
                  {view === 'learners' && <LearnersView />}
                  {view === 'attendance' && <AttendanceView />}
                  {view === 'reports' && <ReportsView />}
                </div>
              </main>
            </div>
          );
        }

        // --- UTILITY COMPONENTS ---
        const NavItem = ({ icon, label, active, onClick }) => (
          <button 
            onClick={onClick}
            className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-left font-medium ${
              active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'
            }`}
          >
            {icon} <span>{label}</span>
          </button>
        );

        const StatCard = ({ title, value, subtitle, icon, bg }) => (
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
            <div className={`w-14 h-14 rounded-full flex items-center justify-center shrink-0 ${bg}`}>
              {icon}
            </div>
            <div>
              <p className="text-sm font-medium text-gray-500 mb-1">{title}</p>
              <h3 className="text-2xl font-bold text-gray-900">{value}</h3>
              {subtitle && <p className="text-xs text-gray-400 mt-1">{subtitle}</p>}
            </div>
          </div>
        );

        // Mount the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
